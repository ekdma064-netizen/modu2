<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스포츠 미션 게임</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<style>
:root{--g:#1D9E75;--gd:#0F6E56;--a:#EF9F27;--r:#E24B4A;--bg:#f8f8f6;--card:#fff;--bd:rgba(0,0,0,0.1);--tx:#1a1a18;--mu:#6b6b68;--ra:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}
.screen{display:none;}.screen.on{display:block;}
#home{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1rem;}
.card{background:var(--card);border:0.5px solid var(--bd);border-radius:var(--ra);padding:2rem;width:100%;max-width:400px;text-align:center;}
.card h1{font-size:24px;font-weight:500;margin-bottom:8px;}
.card p{font-size:14px;color:var(--mu);margin-bottom:20px;line-height:1.6;}
input{display:block;width:100%;padding:12px;border:0.5px solid var(--bd);border-radius:8px;font-size:15px;background:var(--bg);color:var(--tx);outline:none;text-align:center;margin-bottom:10px;}
input:focus{border-color:var(--g);}
.btn{display:block;width:100%;padding:13px;font-size:16px;font-weight:500;border:none;border-radius:8px;cursor:pointer;margin-bottom:8px;}
.green{background:var(--g);color:#fff;}.green:hover{background:var(--gd);}
.out{background:transparent;border:0.5px solid var(--bd);color:var(--tx);}.out:hover{background:#f0f0ee;}
.div{font-size:13px;color:var(--mu);margin:10px 0;}
#teacher{padding:1rem;min-height:100vh;}
.th{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:1rem;}
.th h2{font-size:20px;font-weight:500;}
.bx{display:inline-block;padding:4px 12px;border-radius:99px;font-size:13px;font-weight:500;}
.bg{background:#e1f5ee;color:#0F6E56;}.ba{background:#faeeda;color:#854F0B;}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(min-width:700px){.tg{grid-template-columns:260px 1fr;}}
.pan{background:var(--card);border:0.5px solid var(--bd);border-radius:var(--ra);padding:1rem;}
.pan h3{font-size:13px;color:var(--mu);margin-bottom:10px;}
.rcode{font-size:32px;font-weight:500;letter-spacing:6px;color:var(--g);text-align:center;}
.rurl{font-size:11px;color:var(--mu);text-align:center;word-break:break-all;margin-top:4px;}
.bigt{font-size:64px;font-weight:500;text-align:center;line-height:1;margin-bottom:8px;}
.bw{height:8px;background:#eee;border-radius:4px;overflow:hidden;margin-bottom:12px;}
.bb{height:100%;border-radius:4px;transition:width .1s linear,background .3s;}
.lr{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--bd);}
.lr:last-child{border-bottom:none;}
.lrk{font-size:18px;width:28px;text-align:center;}
.li{flex:1;}.ln{font-size:14px;font-weight:500;}.ls{font-size:11px;color:var(--mu);}
.lbw{height:5px;background:#eee;border-radius:3px;margin-top:3px;}
.lbb{height:100%;border-radius:3px;background:var(--g);transition:width .5s;}
.lsc{font-size:17px;font-weight:500;color:var(--g);}
#student{padding:.75rem;max-width:480px;margin:0 auto;}
.hud{display:flex;justify-content:space-between;padding:8px 12px;background:var(--card);border:0.5px solid var(--bd);border-radius:var(--ra);margin-bottom:8px;}
.hi{text-align:center;}.hl{font-size:11px;color:var(--mu);}.hv{font-size:20px;font-weight:500;}
.mb{text-align:center;padding:1.2rem;background:var(--card);border:0.5px solid var(--bd);border-radius:var(--ra);margin-bottom:10px;}
.me{font-size:58px;line-height:1;margin-bottom:10px;}.mn{font-size:22px;font-weight:500;margin-bottom:4px;}.md{font-size:13px;color:var(--mu);}
.cw{position:relative;width:100%;max-width:340px;margin:0 auto 10px;border-radius:var(--ra);overflow:hidden;border:0.5px solid var(--bd);background:#000;aspect-ratio:4/3;}
.cw video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
.cw canvas{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1);}
.cs{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;font-size:12px;padding:3px 10px;border-radius:99px;white-space:nowrap;}
.ar{display:flex;gap:8px;margin-bottom:10px;}.ar .btn{margin:0;}
.fb{text-align:center;font-size:26px;font-weight:500;min-height:36px;transition:opacity .3s;}
.wb{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:10px;}
.wb .em{font-size:64px;}.wb h2{font-size:22px;font-weight:500;}.wb p{font-size:14px;color:var(--mu);}
#result{display:none;position:fixed;inset:0;background:var(--bg);z-index:100;overflow-y:auto;padding:2rem 1rem;}
.ri{max-width:480px;margin:0 auto;text-align:center;}
.pod{display:flex;justify-content:center;align-items:flex-end;gap:8px;margin:1rem 0 1.5rem;}
.pi{width:90px;text-align:center;}.pn{font-size:13px;font-weight:500;margin-bottom:3px;}.ps{font-size:12px;color:var(--mu);margin-bottom:3px;}
.pb{border-radius:4px 4px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:8px;font-size:24px;}
.fr{display:flex;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid var(--bd);font-size:14px;}
.fr.me2{background:#e1f5ee;}
</style>
</head>
<body>

<div id="home" class="screen on">
  <div class="card">
    <div style="font-size:56px;margin-bottom:12px">🏃</div>
    <h1>스포츠 미션 게임</h1>
    <p>선생님이 방을 만들고<br>학생들은 QR코드로 바로 참가!</p>
    <button class="btn green" onclick="goTeacher()">선생님 – 방 만들기</button>
    <div class="div">── 학생 참가 ──</div>
    <input id="iname" placeholder="내 이름 입력">
    <input id="icode" placeholder="방 코드 입력" maxlength="6" oninput="this.value=this.value.toUpperCase()" style="font-size:20px;letter-spacing:6px;font-weight:500">
    <button class="btn out" onclick="goStudent()">학생 – 게임 참가</button>
    <p id="emsg" style="font-size:13px;margin-top:6px;min-height:20px;"></p>
  </div>
</div>

<div id="teacher" class="screen">
  <div class="th">
    <h2>선생님 화면 <span id="tbadge" class="bx bg"></span></h2>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="tcnt" class="bx ba">0명</span>
      <button class="btn green" id="tsbtn" onclick="tStart()" style="width:auto;padding:8px 16px;margin:0">게임 시작</button>
      <button class="btn out" onclick="location.reload()" id="trbtn" style="width:auto;padding:8px 12px;margin:0;display:none">초기화</button>
    </div>
  </div>
  <div class="tg">
    <div class="pan">
      <h3>학생 참가 QR</h3>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <div id="qrimg"></div>
        <div class="rcode" id="tcode"></div>
        <div class="rurl" id="turl"></div>
      </div>
    </div>
    <div class="pan">
      <div id="twait" style="text-align:center;padding:1rem;color:var(--mu);font-size:14px">학생들이 QR로 입장하면<br>여기 표시됩니다.</div>
      <div id="tplay" style="display:none">
        <div class="bigt" id="ttimer">60</div>
        <div class="bw"><div class="bb" id="tbar" style="width:100%;background:var(--g)"></div></div>
      </div>
      <h3 id="tlbt">참가자</h3>
      <div id="tlb"></div>
    </div>
  </div>
</div>

<div id="student" class="screen">
  <div id="swait" class="wb">
    <div class="em">⏳</div>
    <h2>선생님을 기다리는 중...</h2>
    <p id="swname"></p>
    <p id="sstat" style="color:var(--g);font-size:13px">연결 중...</p>
  </div>
  <div id="sgame" style="display:none">
    <div class="hud">
      <div class="hi"><div class="hl">점수</div><div class="hv" id="ssc">0</div></div>
      <div class="hi"><div class="hl">시간</div><div class="hv" id="stm" style="color:var(--g)">60</div></div>
      <div class="hi"><div class="hl">콤보</div><div class="hv" id="scb">x1</div></div>
    </div>
    <div class="bw" style="margin-bottom:10px"><div class="bb" id="sbar" style="width:100%;background:var(--g)"></div></div>
    <div class="mb">
      <div class="me" id="sem">🙌</div>
      <div class="mn" id="smn">만세!</div>
      <div class="md" id="smd">양손을 머리 위로 올리세요</div>
    </div>
    <div class="cw">
      <video id="svid" autoplay playsinline muted></video>
      <canvas id="scan"></canvas>
      <div class="cs" id="scs">카메라 준비 중...</div>
    </div>
    <div class="ar">
      <button class="btn green" onclick="okBtn()" style="flex:2;font-size:18px">완료!</button>
      <button class="btn out" onclick="skip()" style="flex:1;font-size:14px">건너뛰기</button>
    </div>
    <div class="fb" id="sfb"></div>
  </div>
</div>

<div id="result">
  <div class="ri">
    <div style="font-size:52px;margin-bottom:8px">🏆</div>
    <h2 style="font-size:26px;font-weight:500;margin-bottom:20px">게임 종료!</h2>
    <div class="pod" id="rpod"></div>
    <div style="background:var(--card);border:0.5px solid var(--bd);border-radius:var(--ra);overflow:hidden;margin-bottom:1.5rem">
      <div style="padding:10px 14px;border-bottom:0.5px solid var(--bd);font-size:13px;color:var(--mu)">최종 순위</div>
      <div id="rlb"></div>
    </div>
    <button class="btn green" onclick="location.reload()">처음으로</button>
  </div>
</div>

<script>
const SUPA_URL = 'https://xfqxorbmfxclrhxtweib.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhmcXhvcmJtZnhjbHJoeHR3ZWliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDUwNDMsImV4cCI6MjA5MTY4MTA0M30.GIC1E2Lqa_0lX9YOZ_Etkuv1YMIddrQ36Lm9kRHSJwo';

const MISS = [
  {n:'만세!',      e:'🙌',d:'양손을 머리 위로 높이 올리세요',k:'raise_both'},
  {n:'점프!',      e:'🦘',d:'제자리에서 힘차게 점프하세요', k:'jump'},
  {n:'오른손 번쩍!',e:'👋',d:'오른손을 어깨 위로 올리세요', k:'raise_right'},
  {n:'왼손 번쩍!', e:'🤚',d:'왼손을 어깨 위로 올리세요',  k:'raise_left'},
  {n:'팔 벌려!',   e:'🤸',d:'양팔을 옆으로 쭉 펴세요',    k:'arms_wide'},
  {n:'몸 숙여!',   e:'🙇',d:'상체를 앞으로 숙이세요',      k:'bow'},
];
const DUR = 60;

const { createClient } = window.supabase;
const sb = createClient(SUPA_URL, SUPA_KEY);

let ch; // Supabase 채널
let role='', myId='', myName='', room='';
let players={}, lb=[];
let score=0, combo=1, cnt=0;
let cur=MISS[0];
let dc=false, jc=false, lastY=null;
let timer=null, pose=null;

const $=id=>document.getElementById(id);
const ri=i=>['🥇','🥈','🥉'][i]??(i+1)+'위';
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));$(id).classList.add('on');}
function msg(t,c='var(--r)'){$('emsg').textContent=t;$('emsg').style.color=c;}

// URL 방코드 자동입력
const p=new URLSearchParams(location.search);
if(p.get('room'))$('icode').value=p.get('room').toUpperCase();

// ══════════════════════════════
//  선생님
// ══════════════════════════════
async function goTeacher(){
  role='teacher';
  myId='teacher';
  room=Math.random().toString(36).slice(2,8).toUpperCase();
  players={};
  msg('연결 중...','var(--g)');

  // Supabase Broadcast 채널 구독
  ch = supabase.channel('room-'+room, {
    config: { broadcast: { self: false } }  // 자신이 보낸 건 받지 않음
  });

  ch.on('broadcast', {event:'student'}, ({payload})=>{
    // 학생→선생님 메시지
    if(payload.t==='join'){
      players[payload.id]={name:payload.name,score:0,combo:1,cnt:0};
      renderLB();
    }
    if(payload.t==='score' && players[payload.id]){
      players[payload.id].score=payload.score;
      players[payload.id].combo=payload.combo;
      players[payload.id].cnt=payload.cnt;
      renderLB();
    }
  });

  const status = await new Promise(res=>{
    ch.subscribe(s=>res(s));
  });

  if(status !== 'SUBSCRIBED'){
    msg('연결 실패. 새로고침 후 다시 시도해 주세요.');
    return;
  }
  msg('');

  show('teacher');
  $('tbadge').textContent=room;
  $('tcode').textContent=room;
  const url=location.origin+location.pathname+'?room='+room;
  $('turl').textContent=url;
  new QRCode($('qrimg'),{text:url,width:148,height:148,correctLevel:QRCode.CorrectLevel.M});
}

function renderLB(){
  lb=Object.entries(players).map(([id,v])=>({id,...v})).sort((a,b)=>b.score-a.score);
  $('tcnt').textContent=lb.length+'명';
  const max=lb[0]?.score||1;
  $('tlb').innerHTML=lb.map((p,i)=>`
    <div class="lr">
      <div class="lrk">${ri(i)}</div>
      <div class="li">
        <div class="ln">${p.name}</div>
        <div class="lbw"><div class="lbb" style="width:${Math.round(p.score/max*100)}%"></div></div>
        <div class="ls">${p.score}점 · ${p.cnt||0}동작</div>
      </div>
      <div class="lsc">${p.score}</div>
    </div>`).join('');
}

function tStart(){
  // 선생님→학생 시작 신호
  ch.send({type:'broadcast', event:'teacher', payload:{t:'start'}});
  $('tsbtn').style.display='none';
  $('trbtn').style.display='';
  $('twait').style.display='none';
  $('tplay').style.display='';
  $('tlbt').textContent='실시간 순위';
  let s=DUR;
  timer=setInterval(()=>{
    s-=0.1;
    const pct=Math.max(0,s/DUR*100);
    const c=pct>50?'var(--g)':pct>25?'var(--a)':'var(--r)';
    $('ttimer').textContent=Math.ceil(Math.max(0,s));
    $('ttimer').style.color=c;
    $('tbar').style.width=pct+'%';
    $('tbar').style.background=c;
    if(s<=0){
      clearInterval(timer);
      ch.send({type:'broadcast', event:'teacher', payload:{t:'end', players}});
      showResult();
    }
  },100);
}

// ══════════════════════════════
//  학생
// ══════════════════════════════
async function goStudent(){
  const name=$('iname').value.trim();
  const code=$('icode').value.trim().toUpperCase();
  if(!name||!code){msg('이름과 방 코드를 입력해 주세요!');return;}
  myName=name; room=code; role='student';
  myId='s'+Date.now()+Math.random().toString(36).slice(2,5);
  msg('연결 중...','var(--g)');

  ch = sb.channel('room-'+code, {
    config: { broadcast: { self: false } }
  });

  ch.on('broadcast', {event:'teacher'}, ({payload})=>{
    // 선생님→학생 메시지
    if(payload.t==='start') startGame();
    if(payload.t==='end'){
      lb=Object.entries(payload.players||{}).map(([id,v])=>({id,...v})).sort((a,b)=>b.score-a.score);
      showResult();
    }
  });

  const status = await new Promise(res=>{
    ch.subscribe(s=>res(s));
  });

  if(status !== 'SUBSCRIBED'){
    msg('연결 실패. 방 코드를 확인해 주세요.');
    return;
  }
  msg('');

  // 입장 알림
  ch.send({type:'broadcast', event:'student', payload:{t:'join', id:myId, name}});

  show('student');
  $('swname').textContent=name+'님, 잠깐만 기다려요!';
  $('sstat').textContent='연결 완료! 선생님을 기다리는 중...';
}

function startGame(){
  score=0;combo=1;cnt=0;
  $('swait').style.display='none';
  $('sgame').style.display='block';
  pickM();
  setupCam();
  let s=DUR;
  timer=setInterval(()=>{
    s-=0.1;
    const pct=Math.max(0,s/DUR*100);
    const c=pct>50?'var(--g)':pct>25?'var(--a)':'var(--r)';
    $('stm').textContent=Math.ceil(Math.max(0,s));
    $('stm').style.color=c;
    $('sbar').style.width=pct+'%';
    $('sbar').style.background=c;
    if(s<=0)clearInterval(timer);
  },100);
}

function pickM(){
  let m;
  do{m=MISS[Math.floor(Math.random()*MISS.length)];}while(m===cur&&MISS.length>1);
  cur=m;
  $('sem').textContent=m.e;
  $('smn').textContent=m.n;
  $('smd').textContent=m.d;
  dc=false;
}

function okBtn(){
  if(dc)return; dc=true;
  const pts=10*combo;
  score+=pts; cnt++;
  combo=Math.min(combo+1,5);
  $('ssc').textContent=score;
  $('scb').textContent='x'+combo;
  fb('+'+pts+'점! '+(combo>1?combo+'콤보!':''),'var(--g)');
  ch.send({type:'broadcast', event:'student', payload:{t:'score',id:myId,score,combo,cnt}});
  setTimeout(pickM,700);
}

function skip(){
  combo=1;$('scb').textContent='x1';
  fb('건너뜀...','var(--mu)');
  dc=true;
  setTimeout(pickM,500);
}

function fb(t,c){
  const e=$('sfb');
  e.textContent=t;e.style.color=c;e.style.opacity=1;
  setTimeout(()=>{e.style.opacity=0;},900);
}

function showResult(){
  clearInterval(timer);
  if(pose){try{pose.close();}catch{}}
  const v=$('svid');
  if(v?.srcObject)v.srcObject.getTracks().forEach(t=>t.stop());
  $('result').style.display='block';
  const t3=lb.slice(0,3);
  const ord=[t3[1],t3[0],t3[2]];
  const hs=[100,130,80],cs=['#B4B2A9','#EF9F27','#9FE1CB'],ms=['🥈','🥇','🥉'];
  $('rpod').innerHTML=ord.map((p,i)=>p?`
    <div class="pi">
      <div class="pn">${p.name}</div>
      <div class="ps">${p.score}점</div>
      <div class="pb" style="height:${hs[i]}px;background:${cs[i]}">${ms[i]}</div>
    </div>`:`<div class="pi"></div>`).join('');
  $('rlb').innerHTML=lb.map((p,i)=>`
    <div class="fr ${p.id===myId?'me2':''}">
      <span>${ri(i)} ${p.name}${p.id===myId?' (나)':''}</span>
      <span style="font-weight:500;color:var(--g)">${p.score}점</span>
    </div>`).join('');
}

async function setupCam(){
  try{
    const st=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
    $('svid').srcObject=st;
    $('scs').textContent='AI 인식 로딩 중...';
    loadPose();
  }catch{$('scs').textContent='카메라 없음 – 버튼으로 완료하세요';}
}

function loadPose(){
  if(!window.Pose){$('scs').textContent='버튼으로 완료하세요';return;}
  pose=new Pose({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${f}`});
  pose.setOptions({modelComplexity:0,smoothLandmarks:true,minDetectionConfidence:.5,minTrackingConfidence:.5});
  pose.onResults(onPose);
  pose.initialize().then(()=>{
    $('scs').textContent='준비 완료! 동작을 따라 하세요';
    const v=$('svid'),c=$('scan');
    async function det(){
      if(!pose)return;
      c.width=v.videoWidth||320;c.height=v.videoHeight||240;
      await pose.send({image:v});
      requestAnimationFrame(det);
    }
    v.onloadeddata=()=>requestAnimationFrame(det);
  }).catch(()=>{$('scs').textContent='버튼으로 완료하세요';});
}

function onPose(res){
  if(!res.poseLandmarks||dc)return;
  const L=res.poseLandmarks;
  const[no,lw,rw,ls,rs,lh,rh]=[L[0],L[15],L[16],L[11],L[12],L[23],L[24]];
  const mh=(lh.y+rh.y)/2;
  let hit=false;
  const k=cur.k;
  if(k==='raise_both') hit=lw.y<ls.y-.05&&rw.y<rs.y-.05&&lw.y<no.y&&rw.y<no.y;
  else if(k==='raise_right') hit=rw.y<rs.y-.08&&rw.y<no.y;
  else if(k==='raise_left')  hit=lw.y<ls.y-.08&&lw.y<no.y;
  else if(k==='arms_wide')   hit=Math.abs(lw.x-rw.x)>.55&&Math.abs(lw.y-rw.y)<.2;
  else if(k==='bow')         hit=no.y>(ls.y+rs.y)/2+.12;
  else if(k==='jump'){
    if(lastY!==null&&mh-lastY>.04&&!jc){hit=true;jc=true;setTimeout(()=>jc=false,800);}
    lastY=mh;
  }
  if(hit)okBtn();
}
</script>
