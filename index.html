<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>스포츠 미션 게임</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--g:#1D9E75;--gd:#0F6E56;--a:#EF9F27;--r:#E24B4A;--bg:#f8f8f6;--card:#fff;--bd:rgba(0,0,0,0.1);--tx:#1a1a18;--mu:#6b6b68;--ra:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--tx);}
.screen{display:none;}.screen.on{display:block;}

/* ── HOME ── */
#home{display:flex;align-items:center;justify-content:center;height:100vh;padding:2rem 1rem;overflow-y:auto;}
.card{background:var(--card);border:0.5px solid var(--bd);border-radius:var(--ra);padding:2rem;width:100%;max-width:400px;text-align:center;}
.card h1{font-size:24px;font-weight:500;margin-bottom:8px;}
.card p{font-size:14px;color:var(--mu);margin-bottom:20px;line-height:1.6;}
input{display:block;width:100%;padding:12px;border:0.5px solid var(--bd);border-radius:8px;font-size:15px;background:var(--bg);color:var(--tx);outline:none;text-align:center;margin-bottom:10px;}
input:focus{border-color:var(--g);}
.btn{display:block;width:100%;padding:13px;font-size:16px;font-weight:500;border:none;border-radius:8px;cursor:pointer;margin-bottom:8px;}
.green{background:var(--g);color:#fff;}.green:hover{background:var(--gd);}
.out{background:transparent;border:0.5px solid var(--bd);color:var(--tx);}.out:hover{background:#f0f0ee;}
.div{font-size:13px;color:var(--mu);margin:10px 0;}

/* ── TEACHER ── */
#teacher{padding:1rem;height:100vh;overflow-y:auto;}
.th{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:1rem;}
.th h2{font-size:20px;font-weight:500;}
.bx{display:inline-block;padding:4px 12px;border-radius:99px;font-size:13px;font-weight:500;}
.bg{background:#e1f5ee;color:#0F6E56;}.ba{background:#faeeda;color:#854F0B;}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(min-width:700px){.tg{grid-template-columns:260px 1fr;}}
.pan{background:var(--card);border:0.5px solid var(--bd);border-radius:var(--ra);padding:1rem;}
.pan h3{font-size:13px;color:var(--mu);margin-bottom:10px;}
.rcode{font-size:32px;font-weight:500;letter-spacing:6px;color:var(--g);text-align:center;}
.rurl{font-size:11px;color:var(--mu);text-align:center;word-break:break-all;margin-top:4px;}
.bigt{font-size:48px;font-weight:500;text-align:center;line-height:1;margin-bottom:8px;}
.tbw{height:8px;background:#eee;border-radius:4px;overflow:hidden;margin-bottom:12px;}
.bb{height:100%;border-radius:4px;transition:width .1s linear,background .3s;}
.lr{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--bd);}
.lr:last-child{border-bottom:none;}
.lrk{font-size:18px;width:28px;text-align:center;}
.li{flex:1;}.ln{font-size:14px;font-weight:500;}.ls{font-size:11px;color:var(--mu);}
.lbw{height:5px;background:#eee;border-radius:3px;margin-top:3px;}
.lbb{height:100%;border-radius:3px;background:var(--g);transition:width .5s;}
.lsc{font-size:17px;font-weight:500;color:var(--g);}

/* ── STUDENT ── */
#student{height:100vh;display:none;flex-direction:column;overflow:hidden;}
#student.on{display:flex;}
.wb{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;gap:10px;padding:2rem;}
.wb .em{font-size:64px;}.wb h2{font-size:22px;font-weight:500;}.wb p{font-size:14px;color:var(--mu);}

/* 게임 레이아웃 */
#sgame{display:none;flex-direction:column;height:100vh;overflow:hidden;}
.hud{display:flex;justify-content:space-between;padding:6px 16px;background:var(--card);border-bottom:0.5px solid var(--bd);flex-shrink:0;}
.hi{text-align:center;}.hl{font-size:12px;color:var(--mu);}.hv{font-size:22px;font-weight:500;}
.pgbar{height:5px;background:#eee;flex-shrink:0;}

/* 동작 가이드 패널 30% */
#mission-panel{flex-shrink:0;height:30vh;background:var(--card);border-bottom:0.5px solid var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;}
#ssvg{display:flex;align-items:center;justify-content:center;margin-bottom:6px;}
#smn{font-size:26px;font-weight:500;margin-bottom:3px;}
#smd{font-size:15px;color:var(--mu);text-align:center;}

/* 카메라 패널 70% - 세로 비율 강제 */
#cam-panel{flex:1;position:relative;background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center;}
#cam-inner{position:relative;height:100%;aspect-ratio:3/4;max-width:100%;}
#svid{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
#scan{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1);}
#guide-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;transition:opacity .5s;}
#guide-msg{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);color:#fff;font-size:14px;padding:5px 14px;border-radius:99px;white-space:nowrap;transition:opacity .5s;text-align:center;}
#scs{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;font-size:13px;padding:4px 12px;border-radius:99px;white-space:nowrap;}

/* 하단 상태 */
#bottom-bar{flex-shrink:0;background:var(--card);border-top:0.5px solid var(--bd);}
#pose-status{text-align:center;padding:8px 12px;font-size:16px;color:var(--mu);}
#btn-pass-wrap{text-align:right;padding:4px 12px 6px;}
#judge-panel{padding:10px 12px;text-align:center;}
#judge-msg{font-size:20px;font-weight:500;margin-bottom:10px;line-height:1.4;}

/* RESULT */
#result{display:none;position:fixed;inset:0;background:var(--bg);z-index:100;overflow-y:auto;padding:2rem 1rem;}
.ri{max-width:480px;margin:0 auto;text-align:center;}
.pod{display:flex;justify-content:center;align-items:flex-end;gap:8px;margin:1rem 0 1.5rem;}
.pi{width:90px;text-align:center;}.pn{font-size:13px;font-weight:500;margin-bottom:3px;}.ps{font-size:12px;color:var(--mu);margin-bottom:3px;}
.pb{border-radius:4px 4px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:8px;font-size:24px;}
.fr{display:flex;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid var(--bd);font-size:14px;}
.fr.me2{background:#e1f5ee;}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen on">
  <div class="card">
    <div style="font-size:56px;margin-bottom:12px">🏃</div>
    <h1>스포츠 미션 게임</h1>
    <p>선생님이 방을 만들고<br>학생들은 QR코드로 바로 참가!</p>
    <button class="btn green" id="btn-teacher">선생님 – 방 만들기</button>
    <div class="div">── 학생 참가 ──</div>
    <input id="iname" placeholder="내 이름 입력">
    <input id="icode" placeholder="방 코드 입력" maxlength="6" oninput="this.value=this.value.toUpperCase()" style="font-size:20px;letter-spacing:6px;font-weight:500">
    <button class="btn out" id="btn-student">학생 – 게임 참가</button>
    <p id="emsg" style="font-size:13px;margin-top:6px;min-height:20px;"></p>
  </div>
</div>

<!-- TEACHER -->
<div id="teacher" class="screen">
  <div class="th">
    <h2>선생님 화면 <span id="tbadge" class="bx bg"></span></h2>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="tcnt" class="bx ba">0명</span>
      <button class="btn green" id="tsbtn" style="width:auto;padding:8px 16px;margin:0">게임 시작</button>
      <button class="btn out" onclick="location.reload()" id="trbtn" style="width:auto;padding:8px 12px;margin:0;display:none">초기화</button>
    </div>
  </div>
  <div class="tg">
    <div class="pan">
      <h3>학생 참가 QR</h3>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <div id="qrimg"></div>
        <div class="rcode" id="tcode"></div>
        <div class="rurl" id="turl"></div>
      </div>
    </div>
    <div class="pan">
      <div id="twait" style="text-align:center;padding:1rem;color:var(--mu);font-size:14px">학생들이 QR로 입장하면<br>여기 표시됩니다.</div>
      <div id="tplay" style="display:none">
        <div class="bigt" id="ttimer">5:00</div>
        <div class="tbw"><div class="bb" id="tbar" style="width:100%;background:var(--g)"></div></div>
      </div>
      <h3 id="tlbt">참가자</h3>
      <div id="tlb"></div>
    </div>
  </div>
</div>

<!-- STUDENT -->
<div id="student" class="screen">
  <!-- 대기 -->
  <div id="swait" class="wb">
    <div class="em">⏳</div>
    <h2>선생님을 기다리는 중...</h2>
    <p id="swname"></p>
    <p id="sstat" style="color:var(--g);font-size:13px">연결 중...</p>
  </div>

  <!-- 게임 -->
  <div id="sgame">
    <!-- HUD -->
    <div class="hud">
      <div class="hi"><div class="hl">점수</div><div class="hv" id="ssc">0</div></div>
      <div class="hi"><div class="hl">시간</div><div class="hv" id="stm" style="color:var(--g)">5:00</div></div>
      <div class="hi"><div class="hl">콤보</div><div class="hv" id="scb">x1</div></div>
    </div>
    <div class="pgbar"><div class="bb" id="sbar" style="width:100%;background:var(--g)"></div></div>

    <!-- 동작 가이드 (30%) -->
    <div id="mission-panel">
      <div id="ssvg"></div>
      <div id="smn">준비 중...</div>
      <div id="smd" style="font-size:15px;color:var(--mu)">카메라에 전신이 보이도록 서주세요</div>
    </div>

    <!-- 카메라 (70%) -->
    <div id="cam-panel">
      <div id="cam-inner">
        <video id="svid" autoplay playsinline muted></video>
        <canvas id="scan"></canvas>
        <svg id="guide-svg" viewBox="0 0 100 133" preserveAspectRatio="xMidYMid meet" style="opacity:0.3">
          <circle cx="50" cy="10" r="8" fill="none" stroke="white" stroke-width="2"/>
          <line x1="50" y1="18" x2="50" y2="65" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="50" y1="28" x2="30" y2="50" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="50" y1="28" x2="70" y2="50" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="50" y1="65" x2="38" y2="100" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="38" y1="100" x2="35" y2="130" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="50" y1="65" x2="62" y2="100" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="62" y1="100" x2="65" y2="130" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div id="guide-msg">카메라에 전신이 보이도록 서주세요</div>
        <div id="scs">카메라 준비 중...</div>
      </div>
    </div>

    <!-- 하단 상태바 -->
    <div id="bottom-bar">
      <div id="pose-status">카메라 위치를 맞춰주세요</div>
      <div id="btn-pass-wrap">
        <button class="btn out" id="btn-pass" style="width:auto;padding:6px 18px;margin:0;font-size:14px">패스 ⏭</button>
      </div>
      <div id="judge-panel" style="display:none">
        <div id="judge-msg"></div>
        <div style="display:flex;gap:8px">
          <button class="btn green" id="btn-next" style="flex:1;margin:0">다음 동작 →</button>
          <button class="btn out" id="btn-retry" style="flex:1;margin:0">다시 할게요 🔄</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result">
  <div class="ri">
    <div style="font-size:52px;margin-bottom:8px">🏆</div>
    <h2 style="font-size:26px;font-weight:500;margin-bottom:20px">게임 종료!</h2>
    <div class="pod" id="rpod"></div>
    <div style="background:var(--card);border:0.5px solid var(--bd);border-radius:var(--ra);overflow:hidden;margin-bottom:1.5rem">
      <div style="padding:10px 14px;border-bottom:0.5px solid var(--bd);font-size:13px;color:var(--mu)">최종 순위</div>
      <div id="rlb"></div>
    </div>
    <button class="btn green" onclick="location.reload()">처음으로</button>
  </div>
</div>

const fmt=s=>Math.floor(s/60)+':'+String(Math.ceil(s%60)).padStart(2,'0');
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));$(id).classList.add('on');}
function msg(t,c='var(--r)'){$('emsg').textContent=t;$('emsg').style.color=c;}

const p=new URLSearchParams(location.search);
if(p.get('room'))$('icode').value=p.get('room').toUpperCase();

$('btn-teacher').addEventListener('click',goTeacher);
$('btn-student').addEventListener('click',goStudent);
$('tsbtn').addEventListener('click',tStart);
$('btn-next').addEventListener('click',()=>{closeJudge();pickM();});
$('btn-retry').addEventListener('click',()=>{closeJudge();});
$('btn-pass').addEventListener('click',()=>{combo=1;$('scb').textContent='x1';closeJudge();pickM();});

function closeJudge(){
  judging=false;holdStart=null;
  $('judge-panel').style.display='none';
  $('btn-pass-wrap').style.display='';
  $('pose-status').textContent='동작을 따라 하세요!';
  $('pose-status').style.color='var(--mu)';
}

function showJudge(correct){
  judging=true;
  $('judge-panel').style.display='block';
  $('btn-pass-wrap').style.display='none';
  if(correct){
    const pts=10*combo;
    score+=pts;cnt++;combo=Math.min(combo+1,5);
    $('ssc').textContent=score;$('scb').textContent='x'+combo;
    $('judge-msg').innerHTML='✅ 정확해요!&nbsp;<span style="color:var(--g)">+'+pts+'점</span>'+(combo>1?' 🔥 '+combo+'콤보!':'');
    ch.send({type:'broadcast',event:'student',payload:{t:'score',id:myId,score,combo,cnt}});
    setTimeout(()=>{closeJudge();pickM();},1500);
  } else {
    combo=1;$('scb').textContent='x1';
    $('judge-msg').innerHTML='❌ 동작이 달라요!<br><span style="font-size:13px;color:var(--mu)">다시 해보거나 다음으로 넘어가세요</span>';
  }
}

// ══ 선생님 ══
async function goTeacher(){
  role='teacher';myId='teacher';
  room=Math.random().toString(36).slice(2,8).toUpperCase();
  players={};
  msg('연결 중...','var(--g)');
  ch=sb.channel('room-'+room,{config:{broadcast:{self:false}}});
  ch.on('broadcast',{event:'student'},({payload})=>{
    if(payload.t==='join'){players[payload.id]={name:payload.name,score:0,combo:1,cnt:0};renderLB();}
    if(payload.t==='score'&&players[payload.id]){
      players[payload.id].score=payload.score;
      players[payload.id].combo=payload.combo;
      players[payload.id].cnt=payload.cnt;
      renderLB();
    }
  });
  let ok=false;
  ch.subscribe(s=>{if(s==='SUBSCRIBED')ok=true;});
  for(let i=0;i<100;i++){await new Promise(r=>setTimeout(r,100));if(ok)break;}
  if(!ok){msg('연결 실패! 새로고침 후 다시 시도해 주세요.','var(--r)');return;}
  msg('');
  show('teacher');
  $('tbadge').textContent=room;$('tcode').textContent=room;
  const url=location.origin+location.pathname+'?room='+room;
  $('turl').textContent=url;
  new QRCode($('qrimg'),{text:url,width:148,height:148,correctLevel:QRCode.CorrectLevel.M});
}

function renderLB(){
  lb=Object.entries(players).map(([id,v])=>({id,...v})).sort((a,b)=>b.score-a.score);
  $('tcnt').textContent=lb.length+'명';
  const max=lb[0]?.score||1;
  $('tlb').innerHTML=lb.map((p,i)=>`
    <div class="lr"><div class="lrk">${ri(i)}</div>
    <div class="li"><div class="ln">${p.name}</div>
    <div class="lbw"><div class="lbb" style="width:${Math.round(p.score/max*100)}%"></div></div>
    <div class="ls">${p.score}점 · ${p.cnt||0}동작</div></div>
    <div class="lsc">${p.score}</div></div>`).join('');
}

function tStart(){
  ch.send({type:'broadcast',event:'teacher',payload:{t:'start'}});
  $('tsbtn').style.display='none';$('trbtn').style.display='';
  $('twait').style.display='none';$('tplay').style.display='';
  $('tlbt').textContent='실시간 순위';
  let s=DUR;
  timer=setInterval(()=>{
    s-=0.1;const pct=Math.max(0,s/DUR*100);
    const c=pct>50?'var(--g)':pct>25?'var(--a)':'var(--r)';
    $('ttimer').textContent=fmt(Math.max(0,s));
    $('ttimer').style.color=c;
    $('tbar').style.width=pct+'%';$('tbar').style.background=c;
    if(s<=0){clearInterval(timer);ch.send({type:'broadcast',event:'teacher',payload:{t:'end',players}});showResult();}
  },100);
}

// ══ 학생 ══
async function goStudent(){
  const name=$('iname').value.trim();
  const code=$('icode').value.trim().toUpperCase();
  if(!name||!code){msg('이름과 방 코드를 입력해 주세요!');return;}
  myName=name;room=code;role='student';
  myId='s'+Date.now()+Math.random().toString(36).slice(2,5);

  msg('1단계: Supabase 연결 중...','var(--g)');
  await new Promise(r=>setTimeout(r,100));

  try{
    ch=sb.channel('room-'+code,{config:{broadcast:{self:false}}});
    ch.on('broadcast',{event:'teacher'},({payload})=>{
      if(payload.t==='start')startGame();
      if(payload.t==='end'){
        lb=Object.entries(payload.players||{}).map(([id,v])=>({id,...v})).sort((a,b)=>b.score-a.score);
        showResult();
      }
    });

    msg('2단계: 채널 구독 중...','var(--g)');
    let ok=false;
    ch.subscribe(s=>{
      console.log('student sub status:',s);
      if(s==='SUBSCRIBED')ok=true;
      if(s==='CHANNEL_ERROR')msg('채널 오류! 새로고침해 주세요.','var(--r)');
    });

    for(let i=0;i<100;i++){
      await new Promise(r=>setTimeout(r,100));
      if(ok)break;
      if(i===49)msg('연결 중... 잠시만 기다려주세요 (5초)','var(--g)');
    }

    if(!ok){msg('연결 실패! 방 코드를 확인하거나 새로고침해 주세요.','var(--r)');return;}

    msg('3단계: 입장 완료!','var(--g)');
    ch.send({type:'broadcast',event:'student',payload:{t:'join',id:myId,name}});
    await new Promise(r=>setTimeout(r,300));
    msg('');
    show('student');
    $('swname').textContent=name+'님, 잠깐만 기다려요!';
    $('sstat').textContent='연결 완료! 선생님을 기다리는 중...';
  }catch(e){
    console.error('goStudent error:',e);
    msg('오류: '+e.message,'var(--r)');
  }
}

function startGame(){
  score=0;combo=1;cnt=0;bodyReady=false;cur=null;
  $('swait').style.display='none';
  $('sgame').style.display='flex';
  // 전신 인식 전까지 미션 패널 대기 상태
  $('ssvg').innerHTML='';
  $('smn').textContent='준비 중...';
  $('smd').textContent='카메라에 전신이 보이도록 서주세요';
  setupCam();
  let s=DUR;
  timer=setInterval(()=>{
    s-=0.1;const pct=Math.max(0,s/DUR*100);
    const c=pct>50?'var(--g)':pct>25?'var(--a)':'var(--r)';
    $('stm').textContent=fmt(Math.max(0,s));
    $('stm').style.color=c;
    $('sbar').style.width=pct+'%';$('sbar').style.background=c;
    if(s<=0)clearInterval(timer);
  },100);
}

function pickM(){
  let m;
  do{m=MISS[Math.floor(Math.random()*MISS.length)];}while(m===cur&&MISS.length>1);
  cur=m;
  $('ssvg').innerHTML=POSES[m.k]||'';
  $('smn').textContent=m.n;
  $('smd').textContent=m.d;
  holdStart=null;
}

function showResult(){
  clearInterval(timer);
  if(pose){try{pose.close();}catch{}}
  const v=$('svid');
  if(v?.srcObject)v.srcObject.getTracks().forEach(t=>t.stop());
  $('result').style.display='block';
  const t3=lb.slice(0,3),ord=[t3[1],t3[0],t3[2]];
  const hs=[100,130,80],cs=['#B4B2A9','#EF9F27','#9FE1CB'],ms=['🥈','🥇','🥉'];
  $('rpod').innerHTML=ord.map((p,i)=>p?
    `<div class="pi"><div class="pn">${p.name}</div><div class="ps">${p.score}점</div><div class="pb" style="height:${hs[i]}px;background:${cs[i]}">${ms[i]}</div></div>`
    :'<div class="pi"></div>').join('');
  $('rlb').innerHTML=lb.map((p,i)=>
    `<div class="fr ${p.id===myId?'me2':''}"><span>${ri(i)} ${p.name}${p.id===myId?' (나)':''}</span><span style="font-weight:500;color:var(--g)">${p.score}점</span></div>`
  ).join('');
}

// ── 카메라 ──
async function setupCam(){
  try{
    const st=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:720},height:{ideal:1280}}});
    $('svid').srcObject=st;
    $('scs').textContent='AI 인식 로딩 중...';
    loadPose();
  }catch{$('scs').textContent='카메라 없음';}
}

function loadPose(){
  const tryLoad=()=>{
    if(!window.Pose){setTimeout(tryLoad,500);return;}
    pose=new window.Pose({locateFile:f=>'https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/'+f});
    pose.setOptions({modelComplexity:1,smoothLandmarks:true,minDetectionConfidence:.4,minTrackingConfidence:.4});
    pose.onResults(onPose);
    pose.initialize().then(()=>{
      $('scs').textContent='준비 완료!';
      const v=$('svid'),c=$('scan');
      async function det(){
        if(!pose)return;
        c.width=v.videoWidth||480;c.height=v.videoHeight||640;
        try{await pose.send({image:v});}catch{}
        requestAnimationFrame(det);
      }
      if(v.readyState>=2)requestAnimationFrame(det);
      else v.onloadeddata=()=>requestAnimationFrame(det);
    }).catch(()=>{$('scs').textContent='인식 불가';});
  };
  tryLoad();
}

// ── 포즈 판별 ──
function onPose(res){
  const guideSvg=$('guide-svg');
  const guideMsg=$('guide-msg');

  if(!res.poseLandmarks){
    guideSvg.style.opacity='0.3';
    guideMsg.style.opacity='1';
    guideMsg.textContent='카메라에 전신이 보이도록 서주세요';
    $('pose-status').textContent='📷 사람을 인식 중...';
    $('pose-status').style.color='var(--mu)';
    return;
  }

  const L=res.poseLandmarks;
  const nose=L[0];
  // 좌우반전 보정
  const lw=L[16],rw=L[15];
  const ls=L[12],rs=L[11];
  const lh=L[24],rh=L[23];
  const lAnkle=L[28],rAnkle=L[27];

  // 전신 인식 체크 - 코+어깨 필수, 엉덩이 권장
  const coreOk = nose&&ls&&rs&&
    nose.x>0.02&&nose.x<0.98&&nose.y>0.02&&nose.y<0.95&&
    ls.visibility>0.3&&rs.visibility>0.3;
  const hipOk = lh&&rh&&lh.visibility>0.3&&rh.visibility>0.3&&lh.y<0.97&&rh.y<0.97;

  if(!coreOk){
    guideSvg.style.opacity='0.3';
    guideMsg.style.opacity='1';
    guideMsg.textContent='카메라에 전신이 보이도록 서주세요';
    $('pose-status').textContent='📏 위치를 맞춰주세요!';
    $('pose-status').style.color='var(--a)';
    bodyReady=false;
    return;
  }

  if(!hipOk){
    guideSvg.style.opacity='0.15';
    guideMsg.style.opacity='1';
    guideMsg.textContent='뒤로 조금 물러서세요';
    $('pose-status').textContent='📏 조금 더 뒤로 서주세요';
    $('pose-status').style.color='var(--a)';
    bodyReady=false;
    return;
  }

  // 전신 인식 완료
  guideSvg.style.opacity='0';
  guideMsg.style.opacity='0';

  // 처음 전신 인식되면 미션 시작
  if(!bodyReady){
    bodyReady=true;
    pickM();
    $('pose-status').textContent='동작을 따라 하세요!';
    $('pose-status').style.color='var(--mu)';
  }

  if(judging||!cur)return;

  const shW=Math.abs(ls.x-rs.x)||0.15;
  const shMidY=(ls.y+rs.y)/2;
  const hipMidY=(lh.y+rh.y)/2;
  const bodyH=Math.max(hipMidY-shMidY,0.1);
  let hit=false;
  const k=cur.k;

  if(k==='raise_both')         hit=lw.y<nose.y&&rw.y<nose.y;
  else if(k==='raise_right')   hit=rw.y<nose.y&&lw.y>ls.y;
  else if(k==='raise_left')    hit=lw.y<nose.y&&rw.y>rs.y;
  else if(k==='arms_wide')     hit=Math.abs(lw.x-rw.x)>shW*1.8&&Math.abs(lw.y-ls.y)<shW*0.5&&Math.abs(rw.y-rs.y)<shW*0.5;
  else if(k==='attention')     hit=Math.abs(lw.x-lh.x)<shW*0.4&&Math.abs(lw.y-lh.y)<shW*0.5&&Math.abs(rw.x-rh.x)<shW*0.4&&Math.abs(rw.y-rh.y)<shW*0.5;
  else if(k==='bow')           hit=nose.y>shMidY||(lw.y>nose.y+bodyH*0.2&&rw.y>nose.y+bodyH*0.2);
  else if(k==='hands_hip')     hit=Math.abs(lw.y-lh.y)<bodyH*0.3&&Math.abs(rw.y-rh.y)<bodyH*0.3;
  else if(k==='cross_arms')    hit=lw.y>ls.y&&lw.y<hipMidY&&rw.y>rs.y&&rw.y<hipMidY&&lw.x>rs.x&&rw.x<ls.x;
  else if(k==='right_hip')     hit=Math.abs(rw.y-rh.y)<bodyH*0.3&&Math.abs(lw.y-lh.y)>bodyH*0.35;
  else if(k==='left_hip')      hit=Math.abs(lw.y-lh.y)<bodyH*0.3&&Math.abs(rw.y-rh.y)>bodyH*0.35;
  else if(k==='v_arms')        hit=lw.y<nose.y&&rw.y<nose.y&&Math.abs(lw.x-rw.x)>shW*1.2;
  else if(k==='cheek_frame')   hit=lw.y>nose.y&&lw.y<ls.y&&rw.y>nose.y&&rw.y<rs.y&&Math.abs(lw.x-ls.x)<shW*0.6&&Math.abs(rw.x-rs.x)<shW*0.6;
  else if(k==='right_knee')    {const rk=L[27];hit=rk&&rk.visibility>0.3&&rk.y<rh.y-bodyH*0.1;}
  else if(k==='left_knee')     {const lk=L[28];hit=lk&&lk.visibility>0.3&&lk.y<lh.y-bodyH*0.1;}
  else if(k==='hands_head_wide') hit=lw.y<ls.y&&lw.y>nose.y*0.8&&rw.y<rs.y&&rw.y>nose.y*0.8&&Math.abs(lw.x-rw.x)>shW*1.3;
  else if(k==='right_forward') hit=Math.abs(rw.y-rs.y)<shW*0.5&&rw.x>rs.x+shW*0.3&&lw.y>ls.y;
  else if(k==='left_forward')  hit=Math.abs(lw.y-ls.y)<shW*0.5&&lw.x<ls.x-shW*0.3&&rw.y>rs.y;
  else if(k==='sky_point')     hit=rw.y<nose.y&&lw.y>ls.y;
  else if(k==='lean_side')     {const le=Math.min(ls.x,rs.x)-shW*0.3,re=Math.max(ls.x,rs.x)+shW*0.3;hit=nose.x<le||nose.x>re;}
  else if(k==='clap_above')    hit=lw.y<nose.y&&rw.y<nose.y&&Math.abs(lw.x-rw.x)<shW*0.4;

  const ps=$('pose-status');
  if(hit){
    if(!holdStart)holdStart=Date.now();
    const held=Date.now()-holdStart;
    const pct=Math.min(100,Math.round(held/HOLD_MS*100));
    ps.textContent='✅ 동작 유지 중... '+pct+'%';
    ps.style.color='var(--g)';
    if(held>=HOLD_MS)showJudge(true);
  } else {
    holdStart=null;
    ps.textContent='동작을 따라 하세요!';
    ps.style.color='var(--mu)';
  }
}
</script>
