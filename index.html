<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스포츠 게임</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --green: #1D9E75; --green-dark: #0F6E56;
  --amber: #EF9F27; --red: #E24B4A;
  --bg: #f8f8f6; --card: #fff;
  --border: rgba(0,0,0,0.1);
  --text: #1a1a18; --muted: #6b6b68;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── SETUP ── */
#setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem 1rem; }
.setup-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 2rem; width: 100%; max-width: 440px; }
.setup-card h1 { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
.setup-card p { font-size: 14px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 5px; }
.field input { width: 100%; padding: 11px 13px; border: 0.5px solid var(--border); border-radius: 8px; font-size: 15px; background: var(--bg); color: var(--text); outline: none; }
.field input:focus { border-color: var(--green); }
.btn { display: block; width: 100%; padding: 13px; font-size: 16px; font-weight: 500; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 10px; transition: opacity .15s; }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: var(--green-dark); }
.btn-outline { background: transparent; border: 0.5px solid var(--border); color: var(--text); }
.btn-outline:hover { background: #f0f0ee; }
.divider { text-align: center; font-size: 13px; color: var(--muted); margin: 10px 0; }

/* ── TEACHER DASHBOARD ── */
#teacher-screen { display: none; min-height: 100vh; padding: 1rem; }
.dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
.dash-header h2 { font-size: 20px; font-weight: 500; }
.badge { display: inline-block; padding: 4px 12px; border-radius: 99px; font-size: 13px; font-weight: 500; }
.badge-green { background: #e1f5ee; color: #0F6E56; }
.badge-amber { background: #faeeda; color: #854F0B; }
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
@media(min-width:800px){ .dash-grid { grid-template-columns: 300px 1fr; } }
.panel { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem; }
.panel h3 { font-size: 14px; color: var(--muted); margin-bottom: 10px; }
#qr-box { display: flex; flex-direction: column; align-items: center; gap: 8px; }
#qr-canvas { border-radius: 8px; }
.room-code { font-size: 36px; font-weight: 500; letter-spacing: 6px; color: var(--green); }
.join-url { font-size: 11px; color: var(--muted); word-break: break-all; text-align: center; }

/* leaderboard */
.lb-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
.lb-row:last-child { border-bottom: none; }
.lb-rank { font-size: 20px; width: 32px; text-align: center; }
.lb-name { flex: 1; font-size: 15px; font-weight: 500; }
.lb-score { font-size: 18px; font-weight: 500; color: var(--green); }
.lb-bar-wrap { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-top: 4px; }
.lb-bar { height: 100%; border-radius: 3px; background: var(--green); transition: width .5s ease; }
.lb-sub { font-size: 11px; color: var(--muted); }

/* timer big */
.big-timer { font-size: 72px; font-weight: 500; text-align: center; line-height: 1; }
.timer-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 12px; }
.timer-bar-wrap { width: 100%; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; }
.timer-bar { height: 100%; border-radius: 5px; transition: width .1s linear, background .5s; }

/* podium */
.podium { display: flex; justify-content: center; align-items: flex-end; gap: 8px; margin: 1rem 0 1.5rem; }
.podium-item { width: 90px; text-align: center; }
.podium-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.podium-score { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.podium-block { border-radius: 4px 4px 0 0; display: flex; align-items: flex-start; justify-content: center; padding-top: 8px; font-size: 26px; }

/* ── STUDENT GAME ── */
#student-screen { display: none; min-height: 100vh; padding: .75rem; max-width: 480px; margin: 0 auto; }
.hud { display: flex; justify-content: space-between; padding: 8px 12px; background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; }
.hud-item { text-align: center; }
.hud-label { font-size: 11px; color: var(--muted); }
.hud-val { font-size: 20px; font-weight: 500; }
.mission-box { text-align: center; padding: 1.2rem 1rem; background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; }
.mission-emoji { font-size: 60px; line-height: 1; margin-bottom: 10px; }
.mission-name { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
.mission-desc { font-size: 13px; color: var(--muted); }
.cam-area { position: relative; width: 100%; max-width: 340px; margin: 0 auto 10px; border-radius: var(--radius); overflow: hidden; border: 0.5px solid var(--border); background: #000; aspect-ratio: 4/3; }
.cam-area video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
.cam-area canvas { position: absolute; top:0; left:0; width:100%; height:100%; transform: scaleX(-1); }
.cam-status { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.6); color: #fff; font-size: 12px; padding: 3px 10px; border-radius: 99px; white-space: nowrap; }
.action-row { display: flex; gap: 8px; margin-bottom: 10px; }
.action-row .btn { margin: 0; }
.feedback { text-align: center; font-size: 26px; font-weight: 500; min-height: 40px; transition: opacity .3s; }
.mini-lb { margin-top: 10px; background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.mini-lb-head { font-size: 12px; color: var(--muted); padding: 6px 12px; border-bottom: 0.5px solid var(--border); }
.mini-lb-row { display: flex; justify-content: space-between; padding: 7px 12px; border-bottom: 0.5px solid var(--border); font-size: 13px; }
.mini-lb-row:last-child { border-bottom: none; }
.mini-lb-row.me { background: #e1f5ee; }

/* waiting overlay */
.wait-box { text-align: center; padding: 3rem 1rem; }
.wait-box .big-emoji { font-size: 64px; margin-bottom: 12px; }
.wait-box h2 { font-size: 22px; font-weight: 500; margin-bottom: 8px; }
.wait-box p { font-size: 15px; color: var(--muted); }

/* result full */
#result-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100; overflow-y: auto; padding: 2rem 1rem; }
</style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div id="setup-screen">
  <div class="setup-card">
    <h1>🏃 스포츠 미션 게임</h1>
    <p>선생님은 방을 만들고, 학생들은 QR코드로 스마트폰에서 바로 참가해요.</p>

    <div id="config-section">
      <div class="field">
        <label>Firebase 설정 (config.js 붙여넣기)</label>
        <input id="fb-apikey" placeholder="apiKey" />
      </div>
      <div class="field">
        <input id="fb-projectid" placeholder="projectId" />
      </div>
      <div class="field">
        <input id="fb-dburl" placeholder="databaseURL (https://xxx.firebaseio.com)" />
      </div>
      <div class="field">
        <input id="fb-appid" placeholder="appId" />
      </div>
    </div>

    <div class="divider">─── 역할 선택 ───</div>
    <button class="btn btn-green" onclick="startAsTeacher()">선생님 – 방 만들기</button>
    <div class="field" style="margin-top:10px">
      <input id="join-code" placeholder="방 코드 입력 (학생용)" style="text-align:center;font-size:20px;letter-spacing:6px;font-weight:500" maxlength="5" oninput="this.value=this.value.toUpperCase()"/>
    </div>
    <div class="field">
      <input id="student-name" placeholder="내 이름 입력" />
    </div>
    <button class="btn btn-outline" onclick="startAsStudent()">학생 – 게임 참가</button>
    <p style="font-size:12px;color:var(--muted);margin-top:12px;text-align:center">Firebase 설정이 없으면 데모 모드로 동작해요</p>
  </div>
</div>

<!-- ══ TEACHER DASHBOARD ══ -->
<div id="teacher-screen">
  <div class="dash-header">
    <h2>선생님 화면 <span id="room-code-badge" class="badge badge-green"></span></h2>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="player-count-badge" class="badge badge-amber">0명 참가</span>
      <button class="btn btn-green" id="start-btn" onclick="teacherStartGame()" style="width:auto;padding:8px 18px;margin:0">게임 시작</button>
      <button class="btn btn-outline" id="reset-btn" onclick="resetGame()" style="width:auto;padding:8px 14px;margin:0;display:none">초기화</button>
    </div>
  </div>

  <div class="dash-grid">
    <!-- QR panel -->
    <div class="panel">
      <h3>학생 참가 QR / 링크</h3>
      <div id="qr-box">
        <div id="qr-canvas"></div>
        <div class="room-code" id="t-room-code"></div>
        <div class="join-url" id="join-url-text"></div>
      </div>
    </div>

    <!-- Timer + Leaderboard -->
    <div class="panel">
      <div id="t-waiting-msg" style="text-align:center;padding:1rem;color:var(--muted);font-size:14px">게임 시작 전입니다.<br>학생들이 QR로 입장하면<br>참가자 목록에 표시됩니다.</div>
      <div id="t-playing" style="display:none">
        <div class="timer-wrap">
          <div class="big-timer" id="t-timer">60</div>
          <div class="timer-bar-wrap"><div class="timer-bar" id="t-timer-bar" style="width:100%;background:var(--green)"></div></div>
        </div>
      </div>
      <h3 id="lb-title" style="margin-bottom:8px">참가자</h3>
      <div id="t-leaderboard"></div>
    </div>
  </div>
</div>

<!-- ══ STUDENT SCREEN ══ -->
<div id="student-screen">
  <!-- waiting -->
  <div id="s-waiting" class="wait-box">
    <div class="big-emoji">⏳</div>
    <h2>선생님을 기다리는 중...</h2>
    <p id="s-wait-name"></p>
  </div>

  <!-- game -->
  <div id="s-game" style="display:none">
    <div class="hud">
      <div class="hud-item"><div class="hud-label">점수</div><div class="hud-val" id="s-score">0</div></div>
      <div class="hud-item"><div class="hud-label">시간</div><div class="hud-val" id="s-time" style="color:var(--green)">60</div></div>
      <div class="hud-item"><div class="hud-label">콤보</div><div class="hud-val" id="s-combo">x1</div></div>
      <div class="hud-item"><div class="hud-label">순위</div><div class="hud-val" id="s-rank">-</div></div>
    </div>
    <div class="timer-bar-wrap" style="margin-bottom:10px"><div class="timer-bar" id="s-timer-bar" style="width:100%;background:var(--green)"></div></div>

    <div class="mission-box">
      <div class="mission-emoji" id="s-mission-emoji">🙌</div>
      <div class="mission-name" id="s-mission-name">만세!</div>
      <div class="mission-desc" id="s-mission-desc">양손을 머리 위로 올리세요</div>
    </div>

    <div class="cam-area" id="cam-wrap">
      <video id="s-video" autoplay playsinline muted></video>
      <canvas id="s-canvas"></canvas>
      <div class="cam-status" id="cam-status">카메라 준비 중...</div>
    </div>

    <div class="action-row">
      <button class="btn btn-green" onclick="successMission()" style="flex:2;font-size:18px">완료!</button>
      <button class="btn btn-outline" onclick="skipMission()" style="flex:1;font-size:14px">건너뛰기</button>
    </div>
    <div class="feedback" id="s-feedback"></div>

    <div class="mini-lb" id="s-mini-lb">
      <div class="mini-lb-head">실시간 순위</div>
      <div id="s-mini-lb-body"></div>
    </div>
  </div>
</div>

<!-- ══ RESULT OVERLAY ══ -->
<div id="result-overlay">
  <div style="max-width:500px;margin:0 auto;text-align:center">
    <div style="font-size:52px;margin-bottom:8px">🏆</div>
    <h2 style="font-size:26px;font-weight:500;margin-bottom:20px">게임 종료!</h2>
    <div class="podium" id="podium"></div>
    <div style="background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1.5rem">
      <div style="padding:10px 14px;border-bottom:0.5px solid var(--border);font-size:14px;color:var(--muted);font-weight:500">최종 순위</div>
      <div id="final-lb"></div>
    </div>
    <button class="btn btn-green" onclick="location.reload()">처음으로</button>
  </div>
</div>

<script type="module">
// ── Firebase dynamic import ──
const MISSIONS = [
  { name:'만세!', emoji:'🙌', desc:'양손을 머리 위로 높이 올리세요', key:'raise_both' },
  { name:'점프!', emoji:'🦘', desc:'제자리에서 힘차게 점프하세요', key:'jump' },
  { name:'오른손 번쩍!', emoji:'👋', desc:'오른손을 어깨 위로 올리세요', key:'raise_right' },
  { name:'왼손 번쩍!', emoji:'🤚', desc:'왼손을 어깨 위로 올리세요', key:'raise_left' },
  { name:'팔 벌려!', emoji:'🤸', desc:'양팔을 옆으로 쭉 펴세요', key:'arms_wide' },
  { name:'몸 숙여!', emoji:'🙇', desc:'상체를 앞으로 숙이세요', key:'bow' },
];
const DURATION = 60;

let db = null, roomRef = null, myId = null, myName = '';
let role = '', roomCode = '';
let score = 0, combo = 1, missionCount = 0;
let currentMission = MISSIONS[0];
let detCooldown = false, jumpCooldown = false, lastHipY = null;
let timerInterval = null, pollInterval = null;
let leaderboard = [];
let poseInstance = null;

// expose to global for onclick handlers
window.startAsTeacher = startAsTeacher;
window.startAsStudent = startAsStudent;
window.teacherStartGame = teacherStartGame;
window.resetGame = resetGame;
window.successMission = successMission;
window.skipMission = skipMission;

// ── Firebase init ──
async function initFirebase() {
  const apiKey = document.getElementById('fb-apikey').value.trim();
  const projectId = document.getElementById('fb-projectid').value.trim();
  const databaseURL = document.getElementById('fb-dburl').value.trim();
  const appId = document.getElementById('fb-appid').value.trim();
  if (!apiKey || !projectId || !databaseURL) return false;
  try {
    const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const { getDatabase, ref, set, get, update, onValue } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
    const { getAuth, signInAnonymously } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
    const app = initializeApp({ apiKey, projectId, databaseURL, appId });
    const auth = getAuth(app);
    await signInAnonymously(auth);
    db = getDatabase(app);
    window._fbops = { ref, set, get, update, onValue };
    return true;
  } catch(e) { console.error(e); return false; }
}

function genCode() { return Math.random().toString(36).substring(2,7).toUpperCase(); }
function rankIcon(i) { return ['🥇','🥈','🥉'][i] ?? (i+1)+'위'; }

// ── DEMO fallback (localStorage) ──
const demo = {
  data: {},
  get(k) { try { return JSON.parse(localStorage.getItem('sg_'+k)); } catch { return null; } },
  set(k,v) { localStorage.setItem('sg_'+k, JSON.stringify(v)); },
};

async function dbGet(path) {
  if (db) {
    const { ref, get } = window._fbops;
    const snap = await get(ref(db, path));
    return snap.exists() ? snap.val() : null;
  }
  return demo.get(path);
}
async function dbSet(path, val) {
  if (db) { const { ref, set } = window._fbops; await set(ref(db, path), val); }
  else demo.set(path, val);
}
async function dbUpdate(path, val) {
  if (db) { const { ref, update } = window._fbops; await update(ref(db, path), val); }
  else { const cur = demo.get(path) || {}; demo.set(path, {...cur, ...val}); }
}
function dbListen(path, cb) {
  if (db) {
    const { ref, onValue } = window._fbops;
    onValue(ref(db, path), snap => cb(snap.val()));
  } else {
    pollInterval = setInterval(async () => cb(demo.get(path)), 1500);
  }
}

// ── TEACHER ──
async function startAsTeacher() {
  const ok = await initFirebase();
  myId = 'teacher'; myName = '선생님'; role = 'teacher';
  roomCode = genCode();
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('teacher-screen').style.display = 'block';
  document.getElementById('t-room-code').textContent = roomCode;
  document.getElementById('room-code-badge').textContent = roomCode;

  const joinURL = location.href.split('?')[0] + '?room=' + roomCode;
  document.getElementById('join-url-text').textContent = joinURL;
  new QRCode(document.getElementById('qr-canvas'), { text: joinURL, width: 160, height: 160, correctLevel: QRCode.CorrectLevel.M });

  await dbSet('rooms/' + roomCode, { state: 'waiting', timeLeft: DURATION, players: {} });
  dbListen('rooms/' + roomCode, onRoomUpdate);
  if (!ok) alert('Firebase 미설정 → 데모 모드(같은 기기 탭 간 공유)로 동작합니다.');
}

async function teacherStartGame() {
  await dbUpdate('rooms/' + roomCode, { state: 'playing', timeLeft: DURATION, startedAt: Date.now() });
  document.getElementById('start-btn').style.display = 'none';
  document.getElementById('reset-btn').style.display = '';
  document.getElementById('t-waiting-msg').style.display = 'none';
  document.getElementById('t-playing').style.display = '';
  document.getElementById('lb-title').textContent = '실시간 순위';
  let t = DURATION;
  timerInterval = setInterval(async () => {
    t -= 0.1;
    const pct = Math.max(0, t / DURATION * 100);
    const color = pct > 50 ? 'var(--green)' : pct > 25 ? 'var(--amber)' : 'var(--red)';
    document.getElementById('t-timer').textContent = Math.ceil(Math.max(0, t));
    document.getElementById('t-timer').style.color = color;
    document.getElementById('t-timer-bar').style.width = pct + '%';
    document.getElementById('t-timer-bar').style.background = color;
    if (t <= 0) { clearInterval(timerInterval); await dbUpdate('rooms/' + roomCode, { state: 'ended' }); showResult(); }
  }, 100);
}

async function resetGame() {
  clearInterval(timerInterval);
  await dbSet('rooms/' + roomCode, { state: 'waiting', timeLeft: DURATION, players: {} });
  location.reload();
}

function onRoomUpdate(data) {
  if (!data) return;
  const players = data.players || {};
  leaderboard = Object.entries(players).map(([id, p]) => ({ id, ...p })).sort((a,b) => b.score - a.score);
  document.getElementById('player-count-badge').textContent = leaderboard.length + '명 참가';
  renderTeacherLB();
  if (data.state === 'ended') showResult();
}

function renderTeacherLB() {
  const maxScore = leaderboard[0]?.score || 1;
  document.getElementById('t-leaderboard').innerHTML = leaderboard.map((p,i) => `
    <div class="lb-row">
      <div class="lb-rank">${rankIcon(i)}</div>
      <div style="flex:1">
        <div class="lb-name">${p.name}</div>
        <div class="lb-bar-wrap"><div class="lb-bar" style="width:${Math.round(p.score/maxScore*100)}%"></div></div>
        <div class="lb-sub">${p.score}점 · ${p.count||0}동작</div>
      </div>
    </div>`).join('');
}

// ── STUDENT ──
async function startAsStudent() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  const name = document.getElementById('student-name').value.trim();
  if (!code || !name) { alert('방 코드와 이름을 입력해 주세요!'); return; }
  await initFirebase();
  myId = 'p_' + Date.now() + Math.random().toString(36).slice(2,5);
  myName = name; role = 'student'; roomCode = code;
  const room = await dbGet('rooms/' + code);
  if (!room) { alert('방을 찾을 수 없어요. 코드를 확인해 주세요!'); return; }
  await dbUpdate('rooms/' + code + '/players/' + myId, { name, score: 0, combo: 1, count: 0 });
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('student-screen').style.display = 'block';
  document.getElementById('s-wait-name').textContent = name + '님, 잠깐만 기다려요!';
  dbListen('rooms/' + code, onStudentRoomUpdate);
}

let studentStarted = false;
function onStudentRoomUpdate(data) {
  if (!data) return;
  const players = data.players || {};
  leaderboard = Object.entries(players).map(([id,p])=>({id,...p})).sort((a,b)=>b.score-a.score);
  if (data.state === 'playing' && !studentStarted) { studentStarted = true; startStudentGame(); }
  if (data.state === 'ended') showResult();
  updateStudentHUD();
  renderMiniLB();
}

function startStudentGame() {
  score = 0; combo = 1; missionCount = 0;
  document.getElementById('s-waiting').style.display = 'none';
  document.getElementById('s-game').style.display = 'block';
  pickMission();
  setupCamera();
  let t = DURATION;
  timerInterval = setInterval(() => {
    t -= 0.1; const pct = Math.max(0, t/DURATION*100);
    const color = pct>50?'var(--green)':pct>25?'var(--amber)':'var(--red)';
    document.getElementById('s-time').textContent = Math.ceil(Math.max(0,t));
    document.getElementById('s-time').style.color = color;
    document.getElementById('s-timer-bar').style.width = pct+'%';
    document.getElementById('s-timer-bar').style.background = color;
    if (t <= 0) clearInterval(timerInterval);
  }, 100);
}

function pickMission() {
  let m;
  do { m = MISSIONS[Math.floor(Math.random()*MISSIONS.length)]; } while(m===currentMission&&MISSIONS.length>1);
  currentMission = m;
  document.getElementById('s-mission-emoji').textContent = m.emoji;
  document.getElementById('s-mission-name').textContent = m.name;
  document.getElementById('s-mission-desc').textContent = m.desc;
  detCooldown = false;
}

function successMission() {
  if (detCooldown) return;
  detCooldown = true;
  const pts = 10 * combo;
  score += pts; missionCount++;
  combo = Math.min(combo+1, 5);
  showFeedback('+'+pts+'점! '+(combo>1?combo+'콤보!':''), 'var(--green)');
  updateStudentHUD();
  dbUpdate('rooms/'+roomCode+'/players/'+myId, { score, combo, count: missionCount });
  setTimeout(pickMission, 700);
}

function skipMission() {
  combo = 1;
  showFeedback('건너뜀...', 'var(--muted)');
  detCooldown = true;
  setTimeout(pickMission, 500);
}

function showFeedback(txt, color) {
  const el = document.getElementById('s-feedback');
  el.textContent = txt; el.style.color = color; el.style.opacity = 1;
  setTimeout(()=>{ el.style.opacity=0; }, 900);
}

function updateStudentHUD() {
  document.getElementById('s-score').textContent = score;
  document.getElementById('s-combo').textContent = 'x'+combo;
  const myRank = leaderboard.findIndex(p=>p.id===myId);
  document.getElementById('s-rank').textContent = myRank>=0?(myRank+1)+'위':'-';
}

function renderMiniLB() {
  document.getElementById('s-mini-lb-body').innerHTML = leaderboard.slice(0,5).map((p,i)=>`
    <div class="mini-lb-row ${p.id===myId?'me':''}">
      <span>${rankIcon(i)} ${p.name}${p.id===myId?' (나)':''}</span>
      <span style="font-weight:500;color:var(--green)">${p.score}점</span>
    </div>`).join('');
}

// ── RESULT ──
function showResult() {
  clearInterval(timerInterval);
  if (poseInstance) { try{poseInstance.close();}catch{} }
  const vid = document.getElementById('s-video');
  if (vid?.srcObject) vid.srcObject.getTracks().forEach(t=>t.stop());

  document.getElementById('result-overlay').style.display = 'block';
  const top3 = leaderboard.slice(0,3);
  const order = [top3[1], top3[0], top3[2]];
  const heights = [100,130,80], colors = ['#B4B2A9','#EF9F27','#9FE1CB'], medals=['🥈','🥇','🥉'];
  document.getElementById('podium').innerHTML = order.map((p,vi)=>p?`
    <div class="podium-item">
      <div class="podium-name">${p.name}</div>
      <div class="podium-score">${p.score}점</div>
      <div class="podium-block" style="height:${heights[vi]}px;background:${colors[vi]}">${medals[vi]}</div>
    </div>`:`<div class="podium-item"></div>`).join('');
  document.getElementById('final-lb').innerHTML = leaderboard.map((p,i)=>`
    <div style="display:flex;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid var(--border);${p.id===myId?'background:#e1f5ee':''}">
      <span>${rankIcon(i)} ${p.name}${p.id===myId?' (나)':''}</span>
      <span style="font-weight:500;color:var(--green)">${p.score}점</span>
    </div>`).join('');
}

// ── CAMERA + POSE ──
async function setupCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user' } });
    document.getElementById('s-video').srcObject = stream;
    document.getElementById('cam-status').textContent = 'AI 포즈 인식 로딩 중...';
    loadPose();
  } catch { document.getElementById('cam-status').textContent = '카메라 없음 – 버튼으로 완료하세요'; }
}

function loadPose() {
  if (!window.Pose) { document.getElementById('cam-status').textContent = '포즈 인식 불가 – 버튼으로 완료'; return; }
  const pose = new window.Pose({ locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${f}` });
  pose.setOptions({ modelComplexity:0, smoothLandmarks:true, minDetectionConfidence:.5, minTrackingConfidence:.5 });
  pose.onResults(onPoseResults);
  pose.initialize().then(()=>{
    poseInstance = pose;
    document.getElementById('cam-status').textContent = '준비 완료! 동작을 따라 하세요';
    const video = document.getElementById('s-video');
    const canvas = document.getElementById('s-canvas');
    async function detect() {
      if (!poseInstance) return;
      canvas.width = video.videoWidth||320; canvas.height = video.videoHeight||240;
      await poseInstance.send({ image: video });
      requestAnimationFrame(detect);
    }
    video.onloadeddata = ()=>requestAnimationFrame(detect);
  }).catch(()=>{ document.getElementById('cam-status').textContent = '포즈 인식 불가 – 버튼으로 완료'; });
}

function onPoseResults(results) {
  if (!results.poseLandmarks||detCooldown) return;
  const lm = results.poseLandmarks;
  const [nose,lWrist,rWrist,lShoulder,rShoulder,lHip,rHip] = [lm[0],lm[15],lm[16],lm[11],lm[12],lm[23],lm[24]];
  const midHip = (lHip.y+rHip.y)/2;
  let ok = false;
  const k = currentMission.key;
  if (k==='raise_both') ok = lWrist.y<lShoulder.y-.05&&rWrist.y<rShoulder.y-.05&&lWrist.y<nose.y&&rWrist.y<nose.y;
  else if (k==='raise_right') ok = rWrist.y<rShoulder.y-.08&&rWrist.y<nose.y;
  else if (k==='raise_left') ok = lWrist.y<lShoulder.y-.08&&lWrist.y<nose.y;
  else if (k==='arms_wide') ok = Math.abs(lWrist.x-rWrist.x)>.55&&Math.abs(lWrist.y-rWrist.y)<.2;
  else if (k==='bow') ok = nose.y>(lShoulder.y+rShoulder.y)/2+.12;
  else if (k==='jump') {
    if (lastHipY!==null&&midHip-lastHipY>.04&&!jumpCooldown) {
      ok=true; jumpCooldown=true; setTimeout(()=>{jumpCooldown=false;},800);
    }
    lastHipY=midHip;
  }
  if (ok) successMission();
}

// ── URL params auto-join ──
const params = new URLSearchParams(location.search);
if (params.get('room')) {
  document.getElementById('join-code').value = params.get('room');
}
</script>
